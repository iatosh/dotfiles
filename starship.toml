# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$docker_context\
$conda\
$custom\
$sudo\
$cmd_duration\
$line_break\ 
$status\
$container\
$character"""

right_format = """$time"""

[character]
success_symbol = '[ÔØ»](bold #9C6CE7)'
error_symbol ='[ÔØ»](bold #BD4E67)'

[conda]
symbol = "´äî "
format = '[$symbol$environment]($style) '
style = 'dimmed green'

[directory]
read_only = "´á¢"
truncation_length = 2
# truncate_to_repo = false
style = 'italic #67B7EE'
read_only_style = '#FFC600'
truncation_symbol = '.../'

[docker_context]
symbol = "´îê "

[git_branch]
symbol = ""
format = '[$symbol$branch(:$remote_branch)]($style)'
style = 'bold #7D7D7D'

[git_status]
format = '[$modified$conflicted$stashed$staged$renamed]($style) $deleted$untracked$ahead_behind'
ahead = '[Ôçí${count} ](#9AEDFF)'
diverged = '[Ôçí${ahead_count }Ôçú${behind_count}](purple)'
behind = '[Ôçú${count} ](#FFC600)'
conflicted = '!='
untracked = '[´æä](bold #FFC600)'
deleted = '[´æä](bold #DD0000)'
modified = '*'
renamed = '┬╗'
staged = '+'
stashed = '\\$'
style = 'bold #7D7D7D'
up_to_date = ''

# [nodejs]
# format = '[$symbol($version )]($style)'
# symbol = "¯£ÿ "
# version_format = 'v${major}.${minor}'

[package]
disable = true

