# Dotfiles installation configuration (bash-sourceable)

# Packages to always exclude from symlinking
EXCLUDE_ALWAYS=(bin pkg .git theme misc assets)

# Packages to exclude on Linux (macOS-specific tools)
EXCLUDE_LINUX=(karabiner aerospace)

# Packages to exclude on macOS
EXCLUDE_DARWIN=()

# CLI tools to install via mise on shared Linux servers
# Format: "brew-name;mise-name" if names differ, otherwise just "name"
# (mise backend-qualified identifiers like "cargo:tree-sitter-cli" pass through as-is)
MISE_TOOLS=(
  bat
  btop
  "claude-code;claude"
  eza
  fd
  fzf
  "gh;github-cli"
  lazygit
  neovim
  ripgrep
  rust
  tmux
  "cargo:tree-sitter-cli"
  yazi
  zoxide
)
