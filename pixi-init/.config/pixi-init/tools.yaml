# Tool definitions for pixi-init
tools:
  black-ruff:
    name: "Black + Ruff"
    required: true
    dependencies:
      - "black = \"*\""
      - "ruff = \"*\""
    config:
      black:
        section: "tool.black"
        content: |
          line-length = 88
          target-version = ["py39", "py310", "py311"]
      ruff:
        section: "tool.ruff"
        content: |
          line-length = 88
          target-version = "py311"
          select = ["E", "W", "F", "I", "B", "C4", "UP", "N"]
          ignore = ["E501"]
          
          [tool.ruff.per-file-ignores]
          "__init__.py" = ["F401"]
    tasks:
      format: "black ."
      lint: "ruff check . --fix"
      check-format: "black --check ."
      check-lint: "ruff check ."
    check_tasks: ["check-format", "check-lint"]

  pytest:
    name: "pytest"
    dependencies:
      - "pytest = \"*\""
      - "pytest-cov = \"*\""
    config:
      pytest:
        section: "tool.pytest.ini_options"
        content: |
          testpaths = ["tests"]
          python_files = ["test_*.py", "*_test.py"]
          addopts = ["-ra", "--strict-markers", "--tb=short"]
          markers = [
              "slow: marks tests as slow (deselect with '-m \"not slow\"')",
              "gpu: marks tests that require GPU",
          ]
    tasks:
      test: "pytest -v"
      test-fast: "pytest -v -m 'not slow'"
      test-cov: "pytest --cov=src --cov-report=html --cov-report=term"
    check_tasks: ["test-fast"]
    creates_dirs: ["tests"]
    creates_files:
      "tests/test_model.py": |
        """Test model functionality"""
        import pytest
        import torch
        from src.model import Model
        
        def test_model_forward():
            """Test model forward pass"""
            model = Model()
            batch_size = 2
            x = torch.randn(batch_size, 3, 224, 224)
            output = model(x)
            
            assert output.shape[0] == batch_size
            assert not torch.isnan(output).any()
        
        def test_model_training_mode():
            """Test model training/eval mode switch"""
            model = Model()
            
            # Check training mode
            model.train()
            assert model.training
            
            # Check eval mode
            model.eval()
            assert not model.training

  mypy:
    name: "mypy"
    dependencies:
      - "mypy = \"*\""
      - "pandas-stubs = \"*\""
      - "types-PyYAML = \"*\""
    config:
      mypy:
        section: "tool.mypy"
        content: |
          python_version = "{python_version}"
          warn_return_any = true
          warn_unused_configs = true
          disallow_untyped_defs = true
          disallow_incomplete_defs = true
          check_untyped_defs = true
          no_implicit_optional = true
          warn_redundant_casts = true
          warn_unused_ignores = true
          strict_equality = true
    tasks:
      typecheck: "mypy src/"
    check_tasks: ["typecheck"]
    creates_files:
      "src/py.typed": ""

  hydra:
    name: "Hydra"
    dependencies:
      - "hydra-core = \"1.3.*\""
      - "omegaconf = \"*\""
      - "hydra-colorlog = \"*\""
    creates_dirs: 
      - "configs"
      - "configs/model"
      - "configs/optimizer" 
      - "configs/experiment"
    creates_files:
      "configs/config.yaml": |
        defaults:
          - model: default
          - optimizer: adam
          - _self_
        
        # Experiment settings
        experiment:
          name: baseline
          seed: 42
          
        # Training settings
        training:
          epochs: 100
          batch_size: 32
          gradient_clip: 1.0
          
        # Data settings
        data:
          dataset: cifar10
          num_workers: 4
          augmentation: true
          
        # Logging
        logging:
          log_every_n_steps: 10
          
        # Paths
        paths:
          data_dir: ${oc.env:DATA_DIR,data/}
          output_dir: ${hydra:runtime.output_dir}
          
        # Hydra settings
        hydra:
          run:
            dir: outputs/${experiment.name}/${now:%Y-%m-%d_%H-%M-%S}
          sweep:
            dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
            subdir: ${hydra.job.num}
      
      "configs/model/default.yaml": |
        _target_: src.model.Model
        num_classes: 10
        pretrained: false
        dropout: 0.5
      
      "configs/optimizer/adam.yaml": |
        _target_: torch.optim.Adam
        _partial_: true
        lr: 0.001
        weight_decay: 0.0001
        
      "configs/optimizer/sgd.yaml": |
        _target_: torch.optim.SGD
        _partial_: true
        lr: 0.01
        momentum: 0.9
        weight_decay: 0.0001
        
      "configs/experiment/debug.yaml": |
        # @package _global_
        defaults:
          - override /model: default
          
        experiment:
          name: debug
          
        training:
          epochs: 5
          batch_size: 16
          
        data:
          num_workers: 0  # デバッグ時はシングルスレッド
    
    modifies_files:
      "src/train.py": |
        """Training script with Hydra configuration"""
        import hydra
        from omegaconf import DictConfig, OmegaConf
        import torch
        import logging
        from pathlib import Path
        
        log = logging.getLogger(__name__)
        
        @hydra.main(version_base=None, config_path="../configs", config_name="config")
        def main(cfg: DictConfig) -> float:
            """Main training function"""
            # ログ出力
            log.info(f"Configuration:\n{OmegaConf.to_yaml(cfg)}")
            log.info(f"Working directory: {Path.cwd()}")
            
            # 再現性の確保
            torch.manual_seed(cfg.experiment.seed)
            
            # TODO: 実装
            log.info("Training started...")
            
            return 0.0
            
        if __name__ == "__main__":
            main()

  wandb:
    name: "WandB"
    dependencies:
      - "wandb = \"*\""
    tasks:
      wandb-login: "wandb login"
      wandb-offline: "wandb offline"
    modifies_files:
      "src/train.py": |
        """Training script with Hydra and WandB integration"""
        import hydra
        from omegaconf import DictConfig, OmegaConf
        import wandb
        import torch
        import logging
        from pathlib import Path
        
        log = logging.getLogger(__name__)
        
        @hydra.main(version_base=None, config_path="../configs", config_name="config")
        def main(cfg: DictConfig) -> float:
            """Main training function with WandB logging"""
            # WandB初期化
            wandb.init(
                project=cfg.get("wandb_project", "ml-research"),
                name=cfg.experiment.name,
                config=OmegaConf.to_container(cfg, resolve=True),
                dir=".",
            )
            
            log.info(f"Configuration:\n{OmegaConf.to_yaml(cfg)}")
            log.info(f"Working directory: {Path.cwd()}")
            log.info(f"WandB run: {wandb.run.name}")
            
            # 再現性の確保
            torch.manual_seed(cfg.experiment.seed)
            
            # TODO: 実装
            # wandb.log({"loss": loss, "accuracy": accuracy})
            
            wandb.finish()
            return 0.0
            
        if __name__ == "__main__":
            main()
    gitignore_additions:
      - "wandb/"

  marimo:
    name: "Marimo"
    dependencies:
      - "marimo = \"*\""
    tasks:
      notebook: "marimo edit notebooks/explore.py"
      notebook-run: "marimo run notebooks/explore.py"
      demo: "marimo run demo.py"
    creates_dirs: ["notebooks"]
    creates_files:
      "notebooks/explore.py": |
        import marimo as mo
        import numpy as np
        import torch
        import matplotlib.pyplot as plt
        
        mo.md("# Data Exploration")
        
        # TODO: Add your exploration code

  jupyter:
    name: "Jupyter"
    dependencies:
      - "jupyterlab = \"*\""
      - "ipykernel = \"*\""
    tasks:
      lab: "jupyter lab"
    creates_dirs: ["notebooks"]
    gitattributes_additions:
      - "*.ipynb binary"

  dvc:
    name: "DVC"
    dependencies:
      - "dvc = \"*\""
      - "dvc-gdrive = \"*\""
      - "dvc-s3 = \"*\""
    tasks:
      dvc-init: "dvc init"
      dvc-add: "dvc add"
      dvc-push: "dvc push"
      dvc-pull: "dvc pull"
      save-checkpoint: "dvc add checkpoints/*.pth && git add checkpoints/*.pth.dvc"
      get-checkpoint: "dvc pull checkpoints/*.pth.dvc"
    gitignore_additions:
      - "*.dvc"
      - ".dvc/cache/"
      - ".dvc/tmp/"
      - "!*.dvc"
      - "!.dvc/config"
    creates_files:
      ".dvc/.gitignore": |
        /cache
        /tmp
        /plots

  github-actions:
    name: "GitHub Actions CI"
    creates_dirs: [".github/workflows"]
    creates_files:
      ".github/workflows/ci.yml": |
        name: CI
        
        on:
          push:
            branches: [main]
          pull_request:
            branches: [main]
        
        jobs:
          test:
            runs-on: ubuntu-latest
            
            steps:
            - uses: actions/checkout@v3
            
            - name: Setup Pixi
              uses: prefix-dev/setup-pixi@v0.8.0
              
            - name: Install dependencies
              run: pixi install
              
            - name: Format check
              run: pixi run check-format
              
            - name: Lint check
              run: pixi run check-lint
              {additional_steps}
